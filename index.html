<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Commission Calculator</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* 自定义动画 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideIn {
            from { 
                transform: translateY(-20px); 
                opacity: 0; 
            }
            to { 
                transform: translateY(0); 
                opacity: 1; 
            }
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .animate-fadeIn { 
            animation: fadeIn 0.2s ease-out; 
        }
        
        .animate-slideIn { 
            animation: slideIn 0.3s ease-out; 
        }
        
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        
        /* 自定义样式 */
        .card {
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        .input-field:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .tab-button {
            transition: all 0.2s ease;
        }
        
        .tab-button.active {
            background-color: #3b82f6;
            color: white;
        }
        
        .tab-button:not(.active):hover {
            background-color: #e5e7eb;
        }
        
        /* Toast 样式 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            min-width: 200px;
            animation: slideIn 0.3s ease-out;
        }
        
        /* 隐藏滚动条但保持功能 */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="text-2xl">💰</div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">Sales Commission Calculator</h1>
                        <p class="text-xs text-gray-500">Professional Edition v2.0</p>
                    </div>
                </div>
                
                <!-- License Badge -->
                <div id="license-badge" 
                     style="padding:6px 14px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;cursor:pointer;"
                     onclick="showLicenseModal()">
                    🔑 Loading...
                </div>

            </div>
        </div>
    </nav>

    <!-- 主要内容区 -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        
        <!-- 标签页导航 -->
        <div class="bg-white rounded-xl shadow-sm p-2 mb-6">
            <div class="flex space-x-2">
                <button onclick="switchView('quick')" 
                        id="tab-quick" 
                        class="tab-button flex-1 px-4 py-3 rounded-lg font-medium transition-colors active">
                    📊 Quick Calculate
                </button>
                <button onclick="switchView('salary')" 
                        id="tab-salary" 
                        class="tab-button flex-1 px-4 py-3 rounded-lg font-medium transition-colors">
                    💵 Salary & Allowances
                </button>
                <button onclick="switchView('commission')" 
                        id="tab-commission" 
                        class="tab-button flex-1 px-4 py-3 rounded-lg font-medium transition-colors">
                    💰 Commission & Incentive
                </button>
                
                <button onclick="switchView('history')" 
                        id="tab-history" 
                        class="tab-button flex-1 px-4 py-3 rounded-lg font-medium transition-colors">
                    📜 History
                </button>
            </div>
        </div>

        <!-- Quick Calculate 视图 -->
        <div id="view-quick" class="view-container">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- 左侧：输入区 -->
                <div class="lg:col-span-2 space-y-4">
                    <!-- 月份选择和操作按钮 -->
                    <div class="bg-white rounded-xl shadow-sm p-4 border border-gray-200">
                        <div class="flex flex-wrap items-center gap-4">
                            <div class="flex-1 min-w-[200px]">
                                <label class="block text-sm font-medium text-gray-700 mb-2">Report Month</label>
                                <select id="report-month" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:border-blue-500">
                                    <option value="JAN">JAN</option>
                                    <option value="FEB">FEB</option>
                                    <option value="MAR">MAR</option>
                                    <option value="APR">APR</option>
                                    <option value="MAY">MAY</option>
                                    <option value="JUN">JUN</option>
                                    <option value="JUL">JUL</option>
                                    <option value="AUG">AUG</option>
                                    <option value="SEP">SEP</option>
                                    <option value="OCT">OCT</option>
                                    <option value="NOV">NOV</option>
                                    <option value="DEC">DEC</option>
                                </select>
                            </div>
                            
                            <div class="flex items-end gap-2">
                                <button onclick="importFromExcel()" 
                                        class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 flex items-center space-x-2">
                                    <span>📂</span>
                                    <span>Import Excel</span>
                                </button>
                                
                                <button onclick="clearAllQuickCalculateData()" 
                                        class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 flex items-center space-x-2"
                                        title="Clear all data">
                                    <span>🗑️</span>
                                    <span class="hidden sm:inline">Clear</span>
                                </button>

                            </div>
                        </div>
                    </div>
                    
                    <!-- 销售员卡片容器 -->
                    <div id="salespeople-container" class="space-y-4">
                        <!-- 动态生成的卡片将插入这里 -->
                    </div>
                </div>
                
                <!-- 右侧：汇总和导出 -->
                <div class="space-y-4">
                    <!-- 汇总信息卡片 -->
                    <div id="summary-view" class="bg-gradient-to-br from-blue-500 to-blue-600 rounded-xl shadow-lg p-6 text-white">
                        <h3 class="text-lg font-semibold mb-4">📊 Summary</h3>
                        <div class="space-y-3">
                            <div class="flex justify-between items-center">
                                <span class="text-blue-100">Total People:</span>
                                <span id="summary-count" class="text-2xl font-bold">0</span>
                            </div>
                            <div class="border-t border-blue-400 pt-3">
                                <div class="text-blue-100 text-sm mb-1">Total Commission</div>
                                <div id="summary-commission" class="text-3xl font-bold">RM 0.00</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 导出按钮 -->
                    <div class="flex gap-3">
                        <button onclick="exportTemplate()" 
                                class="flex-1 px-4 py-4 bg-gradient-to-r from-green-500 to-green-600 text-white rounded-xl hover:from-green-600 hover:to-green-700 shadow-lg font-semibold flex items-center justify-center space-x-2">
                            <span>📥</span>
                            <span>Export Excel</span>
                        </button>
                        <button onclick="exportAndPrint()" 
                                class="flex-1 px-4 py-4 bg-gradient-to-r from-purple-500 to-purple-600 text-white rounded-xl hover:from-purple-600 hover:to-purple-700 shadow-lg font-semibold flex items-center justify-center space-x-2">
                            <span>🖨️</span>
                            <span>Export & Print</span>
                        </button>
                    </div>

                    <!-- Batch Export 按钮 -->
                    <div class="mt-3">
                        <button onclick="showBatchExportModal()" 
                                class="w-full px-4 py-3 bg-gradient-to-r from-orange-500 to-orange-600 text-white rounded-xl hover:from-orange-600 hover:to-orange-700 shadow-lg font-semibold flex items-center justify-center space-x-2">
                            <span>📦</span>
                            <span>Batch Export (Multi-Month)</span>
                        </button>
                    </div>
                    

                </div>
            </div>
        </div>

        <!-- Salary & Allowances 视图 -->
        <div id="view-salary" class="view-container hidden">
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                <h2 class="text-2xl font-bold text-gray-900 mb-6">💵 Salary & Allowances Configuration</h2>
                
                <!-- 添加新销售员 -->
                <div class="mb-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
                    <h3 class="font-semibold text-blue-900 mb-3">Add New Salesperson</h3>
                    <div class="flex gap-3">
                        <input type="text" 
                               id="new-person-name" 
                               placeholder="Enter name..." 
                               class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:border-blue-500">
                        <input type="number" 
                               id="new-person-salary" 
                               placeholder="Base salary..." 
                               class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:border-blue-500">
                        <button onclick="addNewPerson()" 
                                class="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                            ➕ Add
                        </button>
                    </div>
                </div>
                
                <!-- 销售员配置列表 -->
                <div id="salary-config-container" class="space-y-4">
                    <!-- 动态生成的配置卡片 -->
                </div>
            </div>
        </div>

        <!-- History 视图 -->
        <!-- Commission & Incentive View -->
        <div id="view-commission" class="view-container hidden">
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                <h2 class="text-2xl font-bold mb-6">💰 Commission & Incentive Configuration</h2>
                <div id="commission-config-container"></div>
            </div>
        </div>

        <div id="view-history" class="view-container hidden">
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-900">📜 Report History</h2>
                    <button onclick="loadQuickCalculateHistory()" 
                            class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 flex items-center space-x-2">
                        <span>🔄</span>
                        <span>Refresh</span>
                    </button>
                </div>
                
                <div id="history-list" class="space-y-4">
                    <!-- 动态生成的历史记录 -->
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- 脚本 -->
    <script>
        // 全局状态
        const appState = {
            salespeople: [],
            config: {},
            currentView: 'quick',
            locale: {
                salesperson: {
                    title: 'Salesperson #{}',
                    noConfigMsg: '⚠️ No salespeople configured. Please go to Salary & Allowances to configure.'
                },
                views: {
                    quick: 'Quick Calculate',
                    salary: 'Salary & Allowances',
                    history: 'History'
                }
            }
        };

        // Toast 通知
        function showToast(icon, message, duration = 3000) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast bg-white shadow-lg rounded-lg px-4 py-3 flex items-center space-x-3 border border-gray-200';
            toast.innerHTML = `
                <span class="text-2xl">${icon}</span>
                <span class="text-gray-700 font-medium">${message}</span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease-out';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        // 视图切换
        function switchView(view) {
            // 更新标签按钮状态
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`tab-${view}`).classList.add('active');
            
            // 隐藏所有视图
            document.querySelectorAll('.view-container').forEach(v => {
                v.classList.add('hidden');
            });
            
            // 显示选中的视图
            document.getElementById(`view-${view}`).classList.remove('hidden');
            
            appState.currentView = view;
            
            // 初始化对应视图
            if (view === 'quick') {
                if (typeof initQuickCalculate === 'function') initQuickCalculate();
                else if (typeof addSalespersonCard === 'function' && document.getElementById('salespeople-container') && document.getElementById('salespeople-container').children.length === 0) addSalespersonCard();
            } else if (view === 'salary') {
                if (typeof initSalaryView === 'function') initSalaryView();
            } else if (view === 'commission') {
                if (typeof initCommissionView === 'function') initCommissionView();
            } else if (view === 'history') {
                if (typeof loadQuickCalculateHistory === 'function') loadQuickCalculateHistory();
            }
        }

        // 保存配置
        async function saveConfig() {
            try {
                await window.electronAPI.saveConfig(appState.config);
            } catch (error) {
                console.error('Failed to save config:', error);
            }
        }

        // 加载配置
        async function loadConfig() {
            try {
                const config = await window.electronAPI.loadConfig();
                appState.config = config || getDefaultConfig();
            } catch (error) {
                console.error('Failed to load config:', error);
                appState.config = getDefaultConfig();
            }
        }

        // 默认配置
        function getDefaultConfig() {
            return {
                base_salaries: {},
                allowances: {},
                deductions: {},
                deductionRates: {},
                earnings: {},
                active_call_targets: {},
                reportHistory: [],
                monthly_commission_rates: [
                    { min: 0, max: 79.99, rate: 0, label: '0%-79%' },
                    { min: 80, max: 89.99, rate: 0.006, label: '80%-89%' },
                    { min: 90, max: 99.99, rate: 0.007, label: '90%-99%' },
                    { min: 100, max: 105.99, rate: 0.008, label: '100%-105%' },
                    { min: 106, max: 999, rate: 0.01, label: '106%+' }
                ],
                quarterly_incentive: [
                    { min: 100, incentive: 400, label: '100%+' },
                    { min: 90, incentive: 200, label: '90%-99%' },
                    { min: 0, incentive: 0, label: '<90%' }
                ],
                collection_incentive: [
                    { min: 100, incentive: 300, label: '100%+' },
                    { min: 90, incentive: 150, label: '90%-99%' },
                    { min: 0, incentive: 0, label: '<90%' }
                ],
                active_call_incentive: [
                    { min: 100, incentive: 200, label: '100%+' },
                    { min: 90, incentive: 100, label: '90%-99%' },
                    { min: 0, incentive: 0, label: '<90%' }
                ]
            };
        }

        // 初始化应用
        async function initApp() {
            console.log('🚀 Initializing application...');
            
            // 加载配置
            await loadConfig();
            
            // 初始化视图
            switchView('quick');
            
            console.log('✅ Application initialized!');
        }

        // 页面加载完成后初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>

    <!-- 引入主要脚本文件 -->
    <script src="src/calculator.js"></script>

    <!-- History 功能增强 -->
    <script>
    function loadQuickCalculateHistory() {
        const historyList = document.getElementById('history-list');
        if (!historyList) return;
        
        const reports = window.appState && window.appState.config && window.appState.config.reportHistory 
                        ? window.appState.config.reportHistory : [];
        
        if (reports.length === 0) {
            historyList.innerHTML = `
                <div class="text-center py-12 text-gray-400">
                    <p class="text-4xl mb-3">📋</p>
                    <p class="text-lg font-medium">No history records yet</p>
                    <p class="text-sm">Export an Excel report to create a history entry</p>
                </div>`;
            return;
        }
        
        const sorted = [...reports]
            .map((r, i) => ({...r, originalIndex: i}))
            .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        
        historyList.innerHTML = sorted.map(report => `
            <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 mb-3">
                <div class="flex justify-between items-start flex-wrap gap-3">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-lg font-bold text-gray-900">${report.month} ${new Date(report.timestamp).getFullYear()}</span>
                            <span class="px-2 py-0.5 bg-blue-100 text-blue-700 text-xs rounded-full">${report.count} people</span>
                        </div>
                        <p class="text-sm text-gray-500">${new Date(report.timestamp).toLocaleString('en-GB')}</p>
                        <p class="text-sm font-semibold text-green-700 mt-1">Total Commission: RM ${(report.totalCommission || 0).toFixed(2)}</p>
                    </div>
                    <div class="flex gap-2 flex-wrap">
                        <button onclick="viewHistoryReport(${report.originalIndex})" class="px-3 py-1.5 bg-blue-500 text-white rounded-lg hover:bg-blue-600 text-sm font-medium">👁 View</button>
                        <button onclick="reExportHistory(${report.originalIndex})" class="px-3 py-1.5 bg-green-500 text-white rounded-lg hover:bg-green-600 text-sm font-medium">📥 Excel</button>
                        <button onclick="printHistoryPDF(${report.originalIndex})" class="px-3 py-1.5 bg-purple-500 text-white rounded-lg hover:bg-purple-600 text-sm font-medium">🖨️ Print PDF</button>
                        <button onclick="deleteHistoryReport(${report.originalIndex})" class="px-3 py-1.5 bg-red-500 text-white rounded-lg hover:bg-red-600 text-sm font-medium">🗑️ Delete</button>
                    </div>
                </div>
                <div class="mt-3 pt-3 border-t border-gray-100 grid grid-cols-4 gap-2 text-xs text-center">
                    ${(report.data || []).map(p => `
                        <div class="bg-gray-50 rounded p-2">
                            <p class="font-semibold text-gray-700">${p.name}</p>
                            <p class="text-green-600">RM ${((p.commission||0)+(p.collectionIncentive||0)+(p.activeCallIncentive||0)+(p.quarterlyBonus||0)).toFixed(0)}</p>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function viewHistoryReport(index) {
        const report = window.appState.config.reportHistory[index];
        if (!report) return;
        const existing = document.getElementById('history-modal');
        if (existing) existing.remove();
        
        const modal = document.createElement('div');
        modal.id = 'history-modal';
        modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4';
        modal.innerHTML = `
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-screen overflow-y-auto">
                <div class="sticky top-0 bg-white border-b px-6 py-4 flex justify-between items-center rounded-t-2xl">
                    <h2 class="text-xl font-bold">${report.month} ${new Date(report.timestamp).getFullYear()} Report</h2>
                    <div class="flex gap-2">
                        <button onclick="reExportHistory(${index})" class="px-4 py-2 bg-green-500 text-white rounded-lg text-sm">📥 Excel</button>
                        <button onclick="printHistoryPDF(${index})" class="px-4 py-2 bg-purple-500 text-white rounded-lg text-sm">🖨️ Print PDF</button>
                        <button onclick="document.getElementById('history-modal').remove()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm">✕ Close</button>
                    </div>
                </div>
                <div class="p-6">
                    <p class="text-sm text-gray-500 mb-4">${new Date(report.timestamp).toLocaleString('en-GB')} &middot; ${report.count} salespeople</p>
                    ${(report.data || []).map(p => `
                        <div class="border rounded-xl p-4 mb-4">
                            <h3 class="font-bold text-lg mb-3">👤 ${p.name}</h3>
                            <div class="grid grid-cols-2 gap-x-8 text-sm">
                                <div class="flex justify-between border-b py-1.5"><span class="text-gray-500">Base Salary</span><span>RM ${(p.salary||0).toFixed(2)}</span></div>
                                <div class="flex justify-between border-b py-1.5"><span class="text-gray-500">Monthly Target</span><span>RM ${(p.target||0).toLocaleString()}</span></div>
                                <div class="flex justify-between border-b py-1.5"><span class="text-gray-500">Monthly Sales</span><span>RM ${(p.sales||0).toLocaleString()}</span></div>
                                <div class="flex justify-between border-b py-1.5"><span class="text-gray-500">Achievement</span><span class="font-semibold ${(p.achievement||0)>=100?'text-green-600':'text-orange-500'}">${(p.achievement||0).toFixed(1)}%</span></div>
                                <div class="flex justify-between border-b py-1.5"><span class="text-gray-500">Commission</span><span class="text-blue-600">RM ${(p.commission||0).toFixed(2)}</span></div>
                                <div class="flex justify-between border-b py-1.5"><span class="text-gray-500">Collection Incentive</span><span class="text-blue-600">RM ${(p.collectionIncentive||0).toFixed(2)}</span></div>
                                <div class="flex justify-between border-b py-1.5"><span class="text-gray-500">Active Call Incentive</span><span class="text-blue-600">RM ${(p.activeCallIncentive||0).toFixed(2)}</span></div>
                                <div class="flex justify-between border-b py-1.5"><span class="text-gray-500">Quarterly Bonus</span><span class="text-blue-600">RM ${(p.quarterlyBonus||0).toFixed(2)}</span></div>
                                <div class="flex justify-between py-1.5 font-bold col-span-2 border-t-2 mt-1"><span>Total Commission</span><span class="text-green-600">RM ${((p.commission||0)+(p.collectionIncentive||0)+(p.activeCallIncentive||0)+(p.quarterlyBonus||0)).toFixed(2)}</span></div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
    }

    async function reExportHistory(index) {
        const report = window.appState.config.reportHistory[index];
        if (!report) return;
        if (typeof showToast === 'function') showToast('⏳', 'Generating Excel...');
        try {
            const result = await window.electronAPI.generateSalaryTemplate({
                salespeople: report.data,
                config: window.appState.config,
                month: report.month
            });
            if (result.success) {
                if (typeof showToast === 'function') showToast('✅', 'Excel exported successfully!');
            } else {
                if (typeof showToast === 'function') showToast('❌', 'Export failed: ' + result.error);
            }
        } catch (e) {
            if (typeof showToast === 'function') showToast('❌', 'Error: ' + e.message);
        }
    }

    async function printHistoryPDF(index) {
        const report = window.appState.config.reportHistory[index];
        if (!report) return;
        if (typeof showToast === 'function') showToast('⏳', 'Preparing PDF...');
        try {
            const result = await window.electronAPI.exportPDF({
                name: report.month + '_' + new Date(report.timestamp).getFullYear(),
                data: report.data,
                month: report.month
            });
            if (result.success) {
                if (typeof showToast === 'function') showToast('✅', 'PDF saved successfully!');
            } else if (!result.error) {
                if (typeof showToast === 'function') showToast('ℹ️', 'Cancelled');
            } else {
                if (typeof showToast === 'function') showToast('❌', 'PDF failed: ' + result.error);
            }
        } catch (e) {
            if (typeof showToast === 'function') showToast('❌', 'Error: ' + e.message);
        }
    }

    function deleteHistoryReport(index) {
        if (!confirm('Delete this history record?')) return;
        window.appState.config.reportHistory.splice(index, 1);
        if (typeof saveConfig === 'function') saveConfig();
        loadQuickCalculateHistory();
        if (typeof showToast === 'function') showToast('✅', 'Record deleted');
    }
    </script>


    <script>
    // Export Excel + 自动打开打印
    async function exportAndPrint() {
        try {
            // Step 1: Export Excel
            showToast('⏳', 'Generating Excel...');
            
            const month = document.getElementById('report-month').value;
            const salesData = window.appState.salespeople.map(person => {
                const nameUpper = person.name.toUpperCase();
                return {
                    ...person,
                    salary: window.appState.config.base_salaries?.[nameUpper] || 0,
                    allowances: window.appState.config.allowances?.[nameUpper] || {},
                    sales: parseFloat(person.sales) || 0,
                    commission: parseFloat(person.commission) || 0,
                    collectionIncentive: parseFloat(person.collectionIncentive) || 0,
                    activeCallIncentive: parseFloat(person.activeCallIncentive) || 0,
                    quarterlyBonus: parseFloat(person.quarterlyBonus) || 0
                };
            });

            const result = await window.electronAPI.generateSalaryTemplate({
                salespeople: salesData,
                config: window.appState.config,
                month: month
            });

            if (!result.success) {
                if (result.message === 'Cancelled') return;
                showToast('❌', 'Export failed: ' + (result.error || result.message));
                return;
            }

            // Step 2: Open file for printing
            showToast('🖨️', 'Opening for print...');
            const printResult = await window.electronAPI.printExcel(result.path);
            
            if (printResult.success) {
                showToast('✅', 'File opened — use Ctrl+P to print!');
            } else {
                showToast('⚠️', 'Excel saved but could not open: ' + printResult.error);
            }

        } catch (e) {
            showToast('❌', 'Error: ' + e.message);
        }
    }
    </script>
